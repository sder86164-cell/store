<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

  // إعداداتك المستخرجة من الصورة 25
  const firebaseConfig = {
    apiKey: "AIzaSyAoQFWpkb1B8twwEC8B9S2XqdUDZ6BI0WQ",
    authDomain: "minister-plus.firebaseapp.com",
    projectId: "minister-plus",
    storageBucket: "minister-plus.firebasestorage.app",
    messagingSenderId: "438719729037",
    appId: "1:438719729037:web:2d7f14f7c988c3afb501c4"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.addApp = async () => {
    const name = prompt("اسم التطبيق المدموج:");
    const ipa = prompt("رابط الـ IPA المباشر من GitHub:");
    const img = prompt("رابط صورة الأيقونة:");

    if(name && ipa) {
        await addDoc(collection(db, "apps"), {
            name, ipa, img, time: new Date().getTime()
        });
        alert("تم النشر بنجاح! سيظهر عند الـ 100 مشترك الآن. 🔥");
    }
  }
</script>

<div style="text-align:center; padding:100px; background:#000;">
  <button onclick="addApp()" style="background:red; color:white; padding:20px; border-radius:50px; font-size:20px; border:none; box-shadow: 0 0 20px red; cursor:pointer;">➕ إضافة تطبيق جديد</button>
</div>
