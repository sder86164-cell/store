<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم الوزير 2026 👑</title>
    <style>
        body { background: #050505; color: white; font-family: 'Cairo', sans-serif; text-align: center; padding: 20px; }
        .admin-box { background: #111; border: 2px solid red; padding: 25px; border-radius: 20px; max-width: 500px; margin: auto; box-shadow: 0 0 30px rgba(255,0,0,0.3); }
        input, textarea { width: 90%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: white; }
        .btn-publish { background: linear-gradient(90deg, #ff0000, #990000); color: white; padding: 15px 40px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 18px; width: 100%; }
    </style>
</head>
<body>
    <h1>مصنع تطبيقات الوزير 🛠️</h1>
    <div class="admin-box">
        <input type="text" id="name" placeholder="اسم التطبيق (مثال: ببجي الوزير)">
        <input type="text" id="ipa" placeholder="رابط ملف الـ IPA المدموج">
        <input type="text" id="icon" placeholder="رابط أيقونة التطبيق">
        <input type="text" id="cert" placeholder="رابط ملف الشهادة (للتوثيق)">
        <textarea id="desc" placeholder="وصف التطبيق (مثال: مدموج بهاك VIP)"></textarea>
        <button class="btn-publish" onclick="pushToUsers()">دمج ونشر تلقائي 🔥</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAoQFWpkb1B8twwEC8B9S2XqdUDZ6BI0WQ",
            authDomain: "minister-plus.firebaseapp.com",
            projectId: "minister-plus",
            storageBucket: "minister-plus.firebasestorage.app",
            appId: "1:438719729037:web:2d7f14f7c988c3afb501c4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.pushToUsers = async () => {
            const data = {
                name: document.getElementById('name').value,
                ipa: document.getElementById('ipa').value,
                icon: document.getElementById('icon').value,
                cert: document.getElementById('cert').value,
                desc: document.getElementById('desc').value,
                time: new Date().getTime()
            };

            if(data.name && data.ipa) {
                await addDoc(collection(db, "apps"), data);
                alert("تم الدمج والرفع! سيظهر الآن عند جميع الزبائن 🚀");
            } else { alert("عبي البيانات كاملة يا وزير!"); }
        }
    </script>
</body>
</html>
