<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحكم الوزير - الإصدار الخارق 🚀</title>
    <style>
        :root { --main-red: #ff0000; }
        body { background: #000; color: #fff; font-family: 'Cairo', sans-serif; text-align: center; padding: 20px; }
        .admin-box { background: #0a0a0a; border: 2px solid var(--main-red); border-radius: 25px; padding: 30px; max-width: 650px; margin: auto; position: relative; overflow: hidden; }
        input, textarea { width: 95%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #333; background: #111; color: #fff; }
        
        /* أنيميشن الرفع والعداد */
        #uploadProgress { display: none; margin-top: 20px; }
        .progress-bar { width: 100%; background: #222; height: 10px; border-radius: 5px; overflow: hidden; }
        .progress-fill { width: 0%; background: var(--main-red); height: 100%; transition: 0.1s; }
        
        .btn-post { background: linear-gradient(45deg, #f00, #600); color: white; padding: 18px; border: none; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; font-size: 20px; margin-top: 20px; display: block; }
        .btn-post:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <h1 style="color:red; text-shadow: 0 0 20px red;">نظام الرفع الصاروخي 🚀</h1>
    <div class="admin-box">
        <input type="text" id="appName" placeholder="اسم التطبيق">
        <input type="text" id="appBundle" placeholder="البندل آيدي (مهم جداً للتثبيت)">
        <input type="text" id="appIpa" placeholder="رابط الـ IPA المباشر">
        <input type="text" id="appImg" placeholder="رابط الأيقونة المباشر">
        <textarea id="appDesc" placeholder="الوصف..."></textarea>
        
        <div id="uploadProgress">
            <p id="statusText">جاري المعالجة والرفع... <span id="percent">0%</span></p>
            <div class="progress-bar"><div id="fill" class="progress-fill"></div></div>
        </div>

        <button class="btn-post" onclick="startRocketUpload()">نشر التطبيق بسرعة الصاروخ 🚀</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAoQFWpkb1B8twwEC8B9S2XqdUDZ6BI0WQ",
            authDomain: "minister-plus.firebaseapp.com",
            projectId: "minister-plus",
            storageBucket: "minister-plus.firebasestorage.app",
            appId: "1:438719729037:web:2d7f14f7c988c3afb501c4"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.startRocketUpload = async () => {
            const name = document.getElementById('appName').value;
            const ipa = document.getElementById('appIpa').value;
            if(!name || !ipa) return alert("عب البيانات يا وزير!");

            document.getElementById('uploadProgress').style.display = 'block';
            let p = 0;
            const interval = setInterval(async () => {
                p += Math.floor(Math.random() * 10) + 5;
                if(p >= 100) {
                    p = 100;
                    clearInterval(interval);
                    await addDoc(collection(db, "apps"), {
                        name, bundle: document.getElementById('appBundle').value,
                        ipa, img: document.getElementById('appImg').value,
                        desc: document.getElementById('appDesc').value, time: Date.now()
                    });
                    alert("تم النشر الصاروخي! ✅");
                    location.reload();
                }
                document.getElementById('percent').innerText = p + "%";
                document.getElementById('fill').style.width = p + "%";
            }, 100);
        };
    </script>
</body>
</html>
