<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الوزير بلس | نظام الإدارة الملكي 👑</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root {
            --accent: #00ff9d;
            --bg: #05080a;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(0, 255, 157, 0.2);
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .admin-container {
            width: 100%;
            max-width: 600px;
            background: linear-gradient(145deg, #0a0f12, #020305);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--accent); font-size: 1.8rem; text-shadow: 0 0 15px var(--accent); }
        
        input, textarea {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            border-radius: 15px;
            color: white;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }

        /* خيار التبديل (الدمج) */
        .switch-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .switch { position: relative; width: 50px; height: 25px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #333; border-radius: 34px; transition: 0.4s; }
        .slider:before { content: ""; position: absolute; height: 19px; width: 19px; left: 3px; bottom: 3px; background: white; transition: 0.4s; border-radius: 50%; }
        input:checked + .slider { background: var(--accent); }
        input:checked + .slider:before { transform: translateX(25px); }

        #cert-box {
            background: rgba(0, 255, 157, 0.05);
            border: 1px dashed var(--accent);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: none; /* مخفي افتراضياً */
        }

        .btn-publish {
            width: 100%;
            padding: 18px;
            background: linear-gradient(90deg, #00ff9d, #00b3ff);
            border: none;
            border-radius: 50px;
            color: #000;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 255, 157, 0.3);
            transition: 0.3s;
        }
        .btn-publish:active { transform: scale(0.95); }

        .app-card {
            background: var(--glass);
            padding: 15px;
            border-radius: 15px;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header">
        <h1>👑 نظام التحكم الملكي</h1>
        <p style="color: #666;">إدارة متجر الوزير بلس</p>
    </div>

    <input type="text" id="appName" placeholder="اسم التطبيق (مثال: سناب بلس)">
    <input type="text" id="appBundle" placeholder="البندل آيدي (Bundle ID)">
    <input type="text" id="appIcon" placeholder="رابط الأيقونة (Direct Link)">
    <input type="text" id="appIpa" placeholder="رابط الـ IPA المباشر">
    <textarea id="appDesc" placeholder="وصف التطبيق المميز..."></textarea>

    <div class="switch-container">
        <span>تطبيق يحتاج دمج شهادة؟</span>
        <label class="switch">
            <input type="checkbox" id="needSign" onchange="toggleCert()">
            <span class="slider"></span>
        </label>
    </div>

    <div id="cert-box">
        <h4 style="margin-top:0; color: var(--accent);">🔑 بيانات التوقيع والدمج</h4>
        <input type="text" id="p12Url" placeholder="رابط ملف الـ P12">
        <input type="text" id="provUrl" placeholder="رابط ملف الـ Mobileprovision">
        <input type="text" id="certPass" placeholder="رمز الشهادة" value="1">
    </div>

    <button class="btn-publish" onclick="uploadToStore()">نشر التطبيق للمشتركين 🚀</button>

    <h3 style="margin-top: 40px; border-bottom: 1px solid #333; padding-bottom: 10px;">📦 التطبيقات المنشورة حالياً</h3>
    <div id="appsList">جاري جلب البيانات...</div>
</div>

<script>
    // تكوين Firebase (ضع بياناتك هنا)
    const firebaseConfig = {
        apiKey: "AIzaSyAoQFWpkb1B8twwEC8B9S2XqdUDZ6BI0WQ",
        authDomain: "minister-plus.firebaseapp.com",
        projectId: "minister-plus",
        storageBucket: "minister-plus.firebasestorage.app",
        appId: "1:438719729037:web:2d7f14f7c988c3afb501c4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // إظهار وإخفاء قسم الشهادة
    function toggleCert() {
        const box = document.getElementById('cert-box');
        box.style.display = document.getElementById('needSign').checked ? 'block' : 'none';
    }

    // وظيفة الرفع لـ Firebase
    async function uploadToStore() {
        const name = document.getElementById('appName').value;
        const ipa = document.getElementById('appIpa').value;
        if(!name || !ipa) return alert("يا وزير، املأ البيانات الأساسية!");

        const appData = {
            name: name,
            bundle: document.getElementById('appBundle').value,
            img: document.getElementById('appIcon').value,
            ipa: ipa,
            desc: document.getElementById('appDesc').value,
            isReady: !document.getElementById('needSign').checked,
            p12: document.getElementById('p12Url').value,
            provision: document.getElementById('provUrl').value,
            pass: document.getElementById('certPass').value,
            time: Date.now()
        };

        try {
            await db.collection("apps").add(appData);
            alert("تم النشر بنجاح! سيظهر عند العملاء فوراً ✅");
            location.reload();
        } catch(e) { alert("خطأ في الاتصال بقاعدة البيانات!"); }
    }

    // عرض القائمة مع إمكانية الحذف
    db.collection("apps").orderBy("time", "desc").onSnapshot(snap => {
        const list = document.getElementById('appsList');
        list.innerHTML = '';
        snap.forEach(doc => {
            const app = doc.data();
            list.innerHTML += `
                <div class="app-card">
                    <div>
                        <strong>${app.name}</strong><br>
                        <small style="color: #888;">${app.isReady ? 'مدموج جاهز' : 'توقيع خاص'}</small>
                    </div>
                    <button onclick="deleteApp('${doc.id}')" style="background:none; border:none; color:#ff4b6a; cursor:pointer;">حذف 🗑️</button>
                </div>
            `;
        });
    });

    async function deleteApp(id) {
        if(confirm("هل أنت متأكد من حذف التطبيق؟")) await db.collection("apps").doc(id).delete();
    }
</script>

</body>
</html>
