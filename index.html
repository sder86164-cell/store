<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متجر الوزير بلس | الفخامة الملكية 👑</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-glow: #00ff00;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 20px;
            background: #000;
            color: #fff;
            font-family: 'Tajawal', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* تأثير النجوم المتحركة */
        #star-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
        }

        header {
            text-align: center;
            padding: 40px 0;
        }

        header h1 {
            font-size: 2.8em;
            margin: 0;
            color: #fff;
            text-shadow: 0 0 15px var(--primary-glow);
            letter-spacing: 2px;
        }

        header p {
            color: #888;
            font-size: 1.1em;
            margin-top: 10px;
        }

        /* قائمة التطبيقات العمودية */
        .app-list {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* تأثير الزجاج (Glassmorphism) */
        .app-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .app-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-glow);
            box-shadow: 0 10px 20px rgba(0, 255, 0, 0.1);
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .app-details {
            flex-grow: 1;
        }

        .app-details h3 {
            margin: 0;
            font-size: 1.3em;
            color: #fff;
        }

        .app-details span {
            font-size: 0.85em;
            color: var(--primary-glow);
            background: rgba(0, 255, 0, 0.1);
            padding: 2px 10px;
            border-radius: 10px;
            margin-top: 5px;
            display: inline-block;
        }

        /* النافذة المنبثقة (Modal) */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: #0a0a0a;
            width: 100%;
            max-width: 450px;
            border-radius: 30px;
            border: 1px solid var(--primary-glow);
            padding: 30px;
            text-align: center;
            position: relative;
            animation: modalIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .close-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            color: #555;
            cursor: pointer;
        }

        .install-btn {
            background: linear-gradient(135deg, #00ff00 0%, #008000 100%);
            color: white;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            font-size: 1.2em;
            font-weight: bold;
            margin-top: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 255, 0, 0.3);
        }

        .status-badge {
            margin: 15px 0;
            font-size: 0.9em;
            color: #aaa;
        }

        #loading { display: none; color: var(--primary-glow); margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<canvas id="star-canvas"></canvas>

<header>
    <h1>الوزير بلس 👑</h1>
    <p>المتجر الأول للتطبيقات الموقعة</p>
</header>

<div class="app-list" id="appList">
    </div>

<div class="modal" id="appModal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">✕</span>
        <img id="mIcon" src="" class="app-icon" style="width: 120px; height: 120px; border-radius: 25px;">
        <h2 id="mName" style="margin: 15px 0 5px 0; font-size: 1.8em;"></h2>
        <div id="mBundle" style="color: #666; margin-bottom: 15px;"></div>
        
        <div class="status-badge">حالة الشهادة: <span style="color: var(--primary-glow);">تعمل بنجاح ✅</span></div>
        
        <p style="color: #888; line-height: 1.6;">هذا التطبيق مدموج بشهادة خاصة ضد الحظر، يدعم جميع إصدارات iOS ويتم تحديثه بشكل دوري.</p>

        <button class="install-btn" id="installAction">تثبيت التطبيق الملكي 🚀</button>
        <div id="loading">جاري معالجة البيانات السحابية...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAoQFWpkb1B8twwEC8B9S2XqdUDZ6BI0WQ",
        authDomain: "minister-plus.firebaseapp.com",
        projectId: "minister-plus",
        storageBucket: "minister-plus.firebasestorage.app",
        appId: "1:438719729037:web:2d7f14f7c988c3afb501c4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // جلب التطبيقات وعرضها
    onSnapshot(query(collection(db, "apps"), orderBy("time", "desc")), (snap) => {
        const listContainer = document.getElementById('appList');
        listContainer.innerHTML = '';
        snap.forEach((doc) => {
            const data = doc.data();
            const card = `
                <div class="app-card" onclick='openModal(${JSON.stringify(data)})'>
                    <img src="${data.img}" class="app-icon">
                    <div class="app-details">
                        <h3>${data.name}</h3>
                        <span>${data.isReady ? 'مدموج وجاهز ✅' : 'شهادة خاصة ✨'}</span>
                    </div>
                    <div style="color: #444; font-size: 1.5em;">←</div>
                </div>
            `;
            listContainer.innerHTML += card;
        });
    });

    // التحكم في المنبثق
    window.openModal = (data) => {
        document.getElementById('mName').innerText = data.name;
        document.getElementById('mIcon').src = data.img;
        document.getElementById('mBundle').innerText = data.bundle;
        document.getElementById('appModal').style.display = 'flex';
        
        document.getElementById('installAction').onclick = () => {
            startInstall(data);
        };
    };

    window.closeModal = () => { document.getElementById('appModal').style.display = 'none'; };

    // البرمجة الثابتة للتثبيت
    function startInstall(data) {
        const btn = document.getElementById('installAction');
        const load = document.getElementById('loading');
        btn.style.display = 'none';
        load.style.display = 'block';

        setTimeout(() => {
            // بناء الـ Plist داخلياً لضمان عمل الرابط
            const plist = `<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>items</key><array><dict><key>assets</key><array><dict><key>kind</key><string>software-package</string><key>url</key><string>${data.ipa}</string></dict></array><key>metadata</key><dict><key>bundle-identifier</key><string>${data.bundle}</string><key>bundle-version</key><string>1.0</string><key>kind</key><string>software</string><key>title</key><string>${data.name}</string></dict></dict></array></dict></plist>`;
            const base64 = btoa(unescape(encodeURIComponent(plist)));
            window.location.href = `itms-services://?action=download-manifest&url=data:text/xml;base64,${base64}`;
            
            load.innerText = "اضغط 'تثبيت' في النافذة الظاهرة";
            setTimeout(() => { closeModal(); btn.style.display = 'block'; load.style.display = 'none'; }, 3000);
        }, 1500);
    }

    // تأثير النجوم المتحركة (Background Particles)
    const canvas = document.getElementById('star-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function initStars() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        stars = [];
        for(let i=0; i<80; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                speed: Math.random() * 0.5 + 0.2
            });
        }
    }
    function animate() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "#ffffff";
        stars.forEach(s => {
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
            ctx.fill();
            s.y += s.speed;
            if(s.y > canvas.height) s.y = 0;
        });
        requestAnimationFrame(animate);
    }
    initStars(); animate();
    window.addEventListener('resize', initStars);
</script>

</body>
</html>
