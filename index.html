<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>الوزير بلس | متجر الفخامة الملكي 👑</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    :root {
      --bg-main: #02030a;
      --accent: #00ff9d;
      --text-muted: #8b90a5;
    }

    body {
      font-family: "Tajawal", sans-serif;
      background: radial-gradient(circle at top, #10152b 0, #02030a 45%, #000000 100%);
      color: #fff;
      margin: 0;
      padding: 24px 16px;
      min-height: 100vh;
    }

    #particles-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .page-shell { position: relative; z-index: 1; max-width: 500px; margin: 0 auto; }

    header { text-align: center; margin-bottom: 30px; }
    .logo { font-size: 2rem; font-weight: 700; color: var(--accent); text-shadow: 0 0 20px var(--accent); }

    .app-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 22px;
      padding: 15px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    .app-card:active { transform: scale(0.95); }
    .app-icon { width: 65px; height: 65px; border-radius: 16px; object-fit: cover; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    .app-info { flex: 1; }
    .app-name { font-weight: 700; font-size: 1.1rem; display: block; }
    .app-status { font-size: 0.8rem; color: var(--accent); display: flex; align-items: center; gap: 5px; margin-top: 5px; }
    .pulse { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: pulse 1.5s infinite; }

    @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(10px); }
    .modal { width: 90%; max-width: 400px; background: #111; border-radius: 30px; padding: 25px; text-align: center; border: 1px solid var(--accent); position: relative; }
    .btn-install { 
      background: linear-gradient(90deg, #00ff9d, #00b3ff); 
      color: #000; padding: 15px 40px; border-radius: 50px; 
      text-decoration: none; font-weight: bold; display: inline-block; margin-top: 20px; 
    }
  </style>
</head>
<body>

<canvas id="particles-canvas"></canvas>

<div class="page-shell">
  <header>
    <div class="logo">الوزير بلس 👑</div>
    <p style="color: #888;">عالم التطبيقات المعدلة بين يديك</p>
  </header>

  <div id="apps-list"></div>
  <div id="loading" style="text-align:center; color: #888;">جاري جلب التطبيقات الملكية...</div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <img id="mIcon" src="" class="app-icon" style="width: 80px; height: 80px; margin-bottom: 15px;">
    <h2 id="mName" style="margin: 10px 0;"></h2>
    <p id="mDesc" style="color: #aaa; font-size: 0.9rem;"></p>
    <div class="app-status" style="justify-content: center;"><div class="pulse"></div> الشهادة تعمل بنجاح ✅</div>
    <a href="#" id="installBtn" class="btn-install">تثبيت الآن 🚀</a>
    <div onclick="closeModal()" style="margin-top: 20px; color: #555; cursor: pointer;">إغلاق</div>
  </div>
</div>

<script>
  // بيانات Firebase (تأكد أنها نفس الموجودة في لوحة التحكم)
  var firebaseConfig = {
      apiKey: "AIzaSyAoQFWpkb1B8twwEC8B9S2XqdUDZ6BI0WQ",
      authDomain: "minister-plus.firebaseapp.com",
      projectId: "minister-plus",
      storageBucket: "minister-plus.firebasestorage.app",
      appId: "1:438719729037:web:2d7f14f7c988c3afb501c4"
  };

  firebase.initializeApp(firebaseConfig);
  var db = firebase.firestore();

  // جلب البيانات من Firestore
  db.collection("apps").orderBy("time", "desc").onSnapshot((snapshot) => {
    const list = document.getElementById("apps-list");
    const loading = document.getElementById("loading");
    list.innerHTML = "";
    loading.style.display = "none";

    snapshot.forEach((doc) => {
      const app = doc.data();
      const card = document.createElement("div");
      card.className = "app-card";
      card.onclick = () => openModal(app);
      card.innerHTML = `
        <img src="${app.img}" class="app-icon">
        <div class="app-info">
          <span class="app-name">${app.name}</span>
          <div class="app-status"><div class="pulse"></div> STABLE VERSION</div>
        </div>
        <div style="color: #444;">›</div>
      `;
      list.appendChild(card);
    });
  });

  function openModal(app) {
    document.getElementById('mIcon').src = app.img;
    document.getElementById('mName').innerText = app.name;
    document.getElementById('mDesc').innerText = app.desc || "نسخة حصرية مقدمة من متجر الوزير بلس.";
    
    // ربط التثبيت (تأكد من وجود رابط IPA أو Manifest)
    const installBtn = document.getElementById('installBtn');
    if(app.ipa) {
        // إذا كان رابط مباشرة نستخدم نظام plist وهمي للتثبيت
        const plist = `<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>items</key><array><dict><key>assets</key><array><dict><key>kind</key><string>software-package</string><key>url</key><string>${app.ipa}</string></dict></array><key>metadata</key><dict><key>bundle-identifier</key><string>${app.bundle || 'com.app.plus'}</string><key>bundle-version</key><string>1.0</string><key>kind</key><string>software</string><key>title</key><string>${app.name}</string></dict></dict></array></dict></plist>`;
        const base64 = btoa(unescape(encodeURIComponent(plist)));
        installBtn.href = `itms-services://?action=download-manifest&url=data:text/xml;base64,${base64}`;
    }

    document.getElementById('modalOverlay').style.display = 'flex';
  }

  function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

  // نظام الجزيئات (Particles)
  const canvas = document.getElementById("particles-canvas");
  const ctx = canvas.getContext("2d");
  let pts = [];
  function init() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    pts = []; for(let i=0; i<50; i++) pts.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: Math.random()-0.5, vy: Math.random()-0.5});
  }
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "rgba(0, 255, 157, 0.2)";
    pts.forEach(p => {
      ctx.beginPath(); ctx.arc(p.x, p.y, 1.5, 0, Math.PI*2); ctx.fill();
      p.x += p.vx; p.y += p.vy;
      if(p.x<0 || p.x>canvas.width) p.vx *= -1; if(p.y<0 || p.y>canvas.height) p.vy *= -1;
    });
    requestAnimationFrame(draw);
  }
  init(); draw();
</script>
</body>
</html>
