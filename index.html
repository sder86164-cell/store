<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الوزير بلس 🔥</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; padding: 0; }
        /* تصميم القائمة (الثلاث شرطات) */
        .menu-btn { position: fixed; top: 15px; right: 15px; font-size: 30px; cursor: pointer; color: red; z-index: 1000; }
        .sidebar { position: fixed; right: -250px; top: 0; width: 250px; height: 100%; background: #111; transition: 0.3s; padding: 20px; border-left: 2px solid red; z-index: 999; }
        .sidebar.active { right: 0; }
        
        header { padding: 40px 20px; text-align: center; background: linear-gradient(to bottom, #900, #000); }
        .app-item { background: #111; margin: 10px; padding: 15px; border-radius: 15px; display: flex; align-items: center; border: 1px solid #222; }
        .app-img { width: 60px; height: 60px; border-radius: 12px; margin-left: 15px; }
        .install-btn { background: red; color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; margin-right: auto; }
    </style>
</head>
<body>

    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    
    <div class="sidebar" id="sidebar">
        <h2 style="color:red;">الوزير بلس 👑</h2>
        <hr border="1" color="red">
        <p>جميع الحقوق محفوظة لفريق الوزير 2026</p>
        <p style="color:#aaa; font-size:13px;">حمل تطبيقاتك الآن من موقع الوزير قبل أن تصبح مدفوعة في الأيام القادمة.. انشر الموقع لأخوياك! 🔥</p>
    </div>

    <header>
        <h1>وزير بلس 🔥</h1>
        <p>تطبيقاتك المحدثة في مكان واحد</p>
    </header>

    <div id="apps-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAoQFWpkb1B8twwEC8B9S2XqdUDZ6BI0WQ",
            authDomain: "minister-plus.firebaseapp.com",
            projectId: "minister-plus",
            storageBucket: "minister-plus.firebasestorage.app",
            appId: "1:438719729037:web:2d7f14f7c988c3afb501c4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // وظيفة القائمة
        window.toggleMenu = () => document.getElementById('sidebar').classList.toggle('active');

        // جلب التطبيقات محدثة تلقائياً
        const q = query(collection(db, "apps"), orderBy("time", "desc"));
        onSnapshot(q, (snapshot) => {
            const container = document.getElementById('apps-container');
            container.innerHTML = '';
            snapshot.forEach((doc) => {
                const app = doc.data();
                container.innerHTML += `
                    <div class="app-item">
                        <img src="${app.icon}" class="app-img">
                        <div>
                            <strong>${app.name}</strong><br>
                            <small style="color:gray;">${app.desc}</small>
                        </div>
                        <button class="install-btn" onclick="installApp('${app.ipa}')">تثبيت</button>
                    </div>
                `;
            });
        });

        window.installApp = (ipaUrl) => {
            if(confirm("هل تريد تثبيت هذا التطبيق؟")) {
                const plist = `https://sder86164-cell.github.io/store/pubg.plist?url=${ipaUrl}`;
                location.href = `itms-services://?action=download-manifest&url=${plist}`;
            }
        };
    </script>
</body>
</html>
