<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الوزير بلس 🔥</title>
    <style>
        body { background: #111; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .app-card { background: #222; padding: 15px; border-radius: 15px; margin-bottom: 15px; display: flex; align-items: center; border: 1px solid #333; }
        .app-img { width: 60px; height: 60px; border-radius: 12px; margin-left: 15px; }
        .install-btn { background: #ff0000; color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: bold; margin-right: auto; }
    </style>
</head>
<body>
    <h1 style="text-align:center;">وزير بلس 👑</h1>
    <div id="app-list">جاري تحميل التطبيقات...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAoQFWpkb1B8twwEC8B9S2XqdUDZ6BI0WQ",
            authDomain: "minister-plus.firebaseapp.com",
            projectId: "minister-plus",
            storageBucket: "minister-plus.firebasestorage.app",
            messagingSenderId: "438719729037",
            appId: "1:438719729037:web:2d7f14f7c988c3afb501c4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const q = query(collection(db, "apps"), orderBy("time", "desc"));
        onSnapshot(q, (snapshot) => {
            const container = document.getElementById('app-list');
            container.innerHTML = '';
            snapshot.forEach((doc) => {
                const data = doc.data();
                container.innerHTML += `
                    <div class="app-card">
                        <img src="${data.icon}" class="app-img">
                        <div>
                            <strong>${data.name}</strong>
                            <div style="font-size:12px; color:#aaa;">${data.desc}</div>
                        </div>
                        <button class="install-btn" onclick="install('${data.ipa}')">تثبيت</button>
                    </div>
                `;
            });
        });

        window.install = (ipaUrl) => {
            // هنا نستخدم رابط itms-services لتحميل الـ IPA
            const plistUrl = `https://sder86164-cell.github.io/store/pubg.plist`; // سنحتاج لتعديل هذا ليكون ديناميكي لاحقاً
            location.href = `itms-services://?action=download-manifest&url=${plistUrl}`;
        };
    </script>
</body>
</html>
