<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الوزير بلس 🔥</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        /* القائمة الجانبية */
        .menu-btn { position: fixed; top: 15px; right: 15px; font-size: 30px; cursor: pointer; color: red; z-index: 1001; }
        .sidebar { position: fixed; right: -280px; top: 0; width: 260px; height: 100%; background: #111; transition: 0.3s; padding: 20px; border-left: 2px solid red; z-index: 1000; }
        .sidebar.active { right: 0; }
        
        header { padding: 60px 20px; text-align: center; background: linear-gradient(to bottom, #700, #000); }
        .app-item { background: #111; margin: 15px; padding: 15px; border-radius: 18px; display: flex; align-items: center; border: 1px solid #222; }
        .app-img { width: 65px; height: 65px; border-radius: 15px; margin-left: 15px; border: 1px solid #333; }
        .info { flex-grow: 1; }
        .install-btn { background: red; color: white; border: none; padding: 10px 25px; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    
    <div class="sidebar" id="sidebar">
        <h2 style="color:red; margin-top:40px;">الوزير بلس 👑</h2>
        <hr border="1" color="red">
        <p style="font-size:14px; line-height:1.6;">حمل تطبيقاتك الآن من موقع الوزير قبل أن تصبح مدفوعة في الأيام القادمة.. انشر الموقع لأخوياك! 🔥</p>
        <div style="position:absolute; bottom:20px; font-size:12px; color:gray;">جميع الحقوق محفوظة لفريق الوزير 2026 ©</div>
    </div>

    <header>
        <h1 style="margin:0; font-size:35px; text-shadow: 0 0 15px red;">الوزير بلس 🔥</h1>
    </header>

    <div id="apps-list" style="padding-bottom: 50px;">جاري جلب تطبيقات الوزير...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAoQFWpkb1B8twwEC8B9S2XqdUDZ6BI0WQ",
            authDomain: "minister-plus.firebaseapp.com",
            projectId: "minister-plus",
            storageBucket: "minister-plus.firebasestorage.app",
            messagingSenderId: "438719729037",
            appId: "1:438719729037:web:2d7f14f7c988c3afb501c4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.toggleMenu = () => document.getElementById('sidebar').classList.toggle('active');

        const q = query(collection(db, "apps"), orderBy("time", "desc"));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('apps-list');
            list.innerHTML = '';
            snapshot.forEach((doc) => {
                const appData = doc.data();
                list.innerHTML += `
                    <div class="app-item">
                        <img src="${appData.icon}" class="app-img">
                        <div class="info">
                            <strong>${appData.name}</strong><br>
                            <small style="color:#888;">${appData.desc}</small>
                        </div>
                        <button class="install-btn" onclick="installApp('${appData.ipa}')">تثبيت</button>
                    </div>
                `;
            });
        });

        window.installApp = (ipaUrl) => {
            if(confirm("هل تريد تثبيت هذا التطبيق؟")) {
                const plist = `https://sder86164-cell.github.io/store/pubg.plist`;
                location.href = `itms-services://?action=download-manifest&url=${plist}`;
            }
        };
    </script>
</body>
</html>
