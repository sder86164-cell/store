<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الوزير بلس | الفخامة المطلقة 👑</title>
    <style>
        /* استيراد خط مشابه لـ SF Pro الخاص بآبل */
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap');

        :root {
            --gold-royal: #d4af37;
            --emerald: #00ff88;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --bg-black: #000000;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-black);
            margin: 0;
            color: #fff;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* 1. الغبار الكوني (Cosmic Dust) */
        #dust-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* الإضاءة النيون الخافتة (Ambient Glow) */
        .ambient-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.1) 0%, transparent 70%);
            filter: blur(80px);
            z-index: -1;
            border-radius: 50%;
            animation: moveGlow 15s infinite alternate;
        }

        @keyframes moveGlow {
            from { top: 10%; left: 10%; }
            to { top: 70%; left: 80%; }
        }

        /* 2. الهيدر واللوادر */
        header {
            padding: 60px 20px 30px;
            text-align: center;
        }

        .logo-pulse {
            font-size: 2.5em;
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: logoPulse 3s infinite ease-in-out;
        }

        @keyframes logoPulse {
            0%, 100% { opacity: 1; filter: drop-shadow(0 0 5px var(--emerald)); }
            50% { opacity: 0.6; filter: drop-shadow(0 0 20px var(--emerald)); }
        }

        /* 3. قائمة التطبيقات (Vertical List) */
        .app-container {
            max-width: 450px;
            margin: 0 auto;
            padding: 0 15px 100px;
        }

        .app-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 0.5px solid var(--border);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), border-color 0.4s;
            position: relative;
            overflow: hidden;
        }

        .app-card:active {
            transform: scale(0.96);
            border-color: var(--emerald);
        }

        .app-icon {
            width: 64px;
            height: 64px;
            border-radius: 14px; /* iOS Squircle */
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .app-meta { flex-grow: 1; }
        .app-name { font-weight: 700; font-size: 1.1em; display: block; margin-bottom: 4px; }
        .app-sub { font-size: 0.8em; color: #666; letter-spacing: 0.5px; }

        /* 4. النافذة المنبثقة (The Elite Pop-up) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            display: none;
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            width: 85%;
            max-width: 380px;
            background: linear-gradient(145deg, #111, #000);
            border: 1px solid var(--border);
            border-radius: 35px;
            padding: 40px 25px;
            text-align: center;
            transform: scale(0.5);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
            opacity: 1;
        }

        /* النبض الضوئي للشهادة */
        .cert-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85em;
            color: #aaa;
            margin-top: 15px;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: var(--emerald);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--emerald);
            animation: dotPulse 1.5s infinite;
        }

        @keyframes dotPulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* زر التحميل (Magic Button) */
        .magic-btn {
            background: linear-gradient(180deg, #333 0%, #111 100%);
            border: 1px solid var(--border);
            color: #fff;
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            font-weight: 700;
            margin-top: 30px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }

        .magic-btn::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            transition: 0.5s;
        }

        .magic-btn:hover::after { left: 100%; }

        /* شريط التمرير المخفي */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <canvas id="dust-canvas"></canvas>
    <div class="ambient-glow"></div>

    <header>
        <div class="logo-pulse">ALWAZIR PLUS</div>
        <p>Ultra-Premium Store</p>
    </header>

    <div class="app-container" id="appList">
        </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <img id="mIcon" src="" class="app-icon" style="width: 100px; height: 100px; margin-bottom: 20px;">
            <h2 id="mName" style="margin: 0; font-size: 1.8em;"></h2>
            
            <div class="cert-badge">
                <div class="pulse-dot"></div>
                الشهادة تعمل بنجاح ✅
            </div>

            <p style="color: #666; font-size: 0.9em; line-height: 1.6; margin-top: 20px;">
                نسخة حصرية، مدموجة بأحدث أدوات التوقيع السحابية لضمان الاستقرار التام.
            </p>

            <button class="magic-btn" id="installBtn">تثبيت الآن ⚡</button>
            <div onclick="closeModal()" style="margin-top: 20px; color: #444; cursor: pointer; font-size: 0.9em;">إغلاق النافذة</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAoQFWpkb1B8twwEC8B9S2XqdUDZ6BI0WQ",
            authDomain: "minister-plus.firebaseapp.com",
            projectId: "minister-plus",
            storageBucket: "minister-plus.firebasestorage.app",
            appId: "1:438719729037:web:2d7f14f7c988c3afb501c4"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // جلب البيانات وعرضها
        onSnapshot(query(collection(db, "apps"), orderBy("time", "desc")), (snap) => {
            const container = document.getElementById('appList');
            container.innerHTML = '';
            snap.forEach((doc) => {
                const app = doc.data();
                const card = document.createElement('div');
                card.className = 'app-card';
                card.onclick = () => openModal(app);
                card.innerHTML = `
                    <img src="${app.img}" class="app-icon">
                    <div class="app-meta">
                        <span class="app-name">${app.name}</span>
                        <span class="app-sub">${app.isReady ? 'STABLE VERSION' : 'SIGNED EDITION'}</span>
                    </div>
                    <div style="opacity: 0.3">→</div>
                `;
                container.appendChild(card);
            });
        });

        // النافذة المنبثقة
        window.openModal = (app) => {
            const overlay = document.getElementById('modalOverlay');
            document.getElementById('mIcon').src = app.img;
            document.getElementById('mName').innerText = app.name;
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('active'), 10);

            document.getElementById('installBtn').onclick = () => {
                const plist = `<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>items</key><array><dict><key>assets</key><array><dict><key>kind</key><string>software-package</string><key>url</key><string>${app.ipa}</string></dict></array><key>metadata</key><dict><key>bundle-identifier</key><string>${app.bundle}</string><key>bundle-version</key><string>1.0</string><key>kind</key><string>software</string><key>title</key><string>${app.name}</string></dict></dict></array></dict></plist>`;
                const base64 = btoa(unescape(encodeURIComponent(plist)));
                window.location.href = `itms-services://?action=download-manifest&url=data:text/xml;base64,${base64}`;
            };
        };

        window.closeModal = () => {
            const overlay = document.getElementById('modalOverlay');
            overlay.classList.remove('active');
            setTimeout(() => overlay.style.display = 'none', 400);
        };

        // 5. تأثير الغبار الكوني (Particle Engine)
        const canvas = document.getElementById('dust-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<60; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.5,
                    vx: Math.random() * 0.2 - 0.1,
                    vy: Math.random() * 0.2 + 0.1
                });
            }
        }
        function render() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "rgba(255,255,255,0.1)";
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
                p.x += p.vx; p.y += p.vy;
                if(p.y > canvas.height) p.y = 0;
            });
            requestAnimationFrame(render);
        }
        init(); render();
        window.addEventListener('resize', init);
    </script>
</body>
</html>
