<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الوزير بلس 👑</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/8.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.6.1/firebase-firestore.js"></script>
</head>
<body style="background:#000; color:#fff; text-align:center; font-family:sans-serif;">

    <h1 style="color:#00ff9d;">الوزير بلس 👑</h1>
    <hr border="1" color="#333">
    
    <div id="apps-list">جاري جلب التطبيقات...</div>

    <script>
        // بيانات Firebase الخاصة بك
        var firebaseConfig = { 
            apiKey: "AIzaSyAoQFWpkb1B8twwEC8B9S2XqdUDZ6BI0WQ", 
            authDomain: "minister-plus.firebaseapp.com", 
            projectId: "minister-plus", 
            storageBucket: "minister-plus.firebasestorage.app", 
            appId: "1:438719729037:web:2d7f14f7c988c3afb501c4" 
        };
        firebase.initializeApp(firebaseConfig);
        var db = firebase.firestore();

        // طريقة جلب البيانات الكلاسيكية المتوافقة مع آيفون 7
        db.collection("apps").get().then(function(querySnapshot) {
            var list = document.getElementById("apps-list");
            list.innerHTML = "";
            
            if (querySnapshot.empty) {
                list.innerHTML = "لا توجد تطبيقات حالياً";
            }

            querySnapshot.forEach(function(doc) {
                var app = doc.data();
                // التأكد أن التطبيق مفعّل
                if (app.isReady === true) {
                    var div = document.createElement("div");
                    div.style.margin = "20px";
                    div.style.padding = "15px";
                    div.style.background = "#111";
                    div.style.border = "1px solid #00ff9d";
                    div.style.borderRadius = "15px";
                    
                    div.innerHTML = '<img src="' + app.img + '" style="width:70px; border-radius:15px;"><br>' +
                                    '<h3>' + app.name + '</h3>' +
                                    '<a href="itms-services://?action=download-manifest&url=data:text/xml;base64,' + 
                                    btoa(unescape(encodeURIComponent('<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>items</key><array><dict><key>assets</key><array><dict><key>kind</key><string>software-package</string><key>url</key><string>' + app.ipa + '</string></dict></array><key>metadata</key><dict><key>bundle-identifier</key><string>' + app.bundle + '</string><key>bundle-version</key><string>1.0</string><key>kind</key><string>software</string><key>title</key><string>' + app.name + '</string></dict></dict></array></dict></plist>'))) + 
                                    '" style="background:#00ff9d; color:#000; padding:10px 25px; border-radius:50px; text-decoration:none; font-weight:bold;">تثبيت الآن</a>';
                    list.appendChild(div);
                }
            });
        }).catch(function(error) {
            document.getElementById("apps-list").innerHTML = "خطأ في الاتصال: " + error;
        });
    </script>
</body>
</html>
