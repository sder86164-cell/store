<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الوزير الملكي 👑</title>
    <style>
        :root { --main-color: #00ff00; --bg-black: #000000; --card-bg: #0a0a0a; }
        body { background: var(--bg-black); color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; text-align: center; }
        
        .header { margin-bottom: 30px; }
        .header h1 { color: var(--main-color); text-shadow: 0 0 20px var(--main-color); font-size: 2.5em; margin: 10px 0; }
        
        .container { max-width: 800px; margin: auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; padding: 10px; }
        
        /* كرت التطبيق الفخم */
        .app-card { background: var(--card-bg); border: 2px solid #1a1a1a; border-radius: 25px; padding: 20px; transition: 0.4s; position: relative; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .app-card:hover { border-color: var(--main-color); transform: translateY(-10px); box-shadow: 0 0 25px rgba(0,255,0,0.2); }
        
        .app-icon { width: 80px; height: 80px; border-radius: 18px; margin-bottom: 12px; border: 1px solid #333; }
        .app-name { font-weight: bold; font-size: 1.1em; margin-bottom: 5px; display: block; }
        .app-version { color: #666; font-size: 0.8em; display: block; margin-bottom: 15px; }
        
        .btn-install { background: linear-gradient(45deg, #00ff00, #006600); color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; font-size: 0.9em; }
        .btn-install:active { transform: scale(0.95); }

        /* شاشة التحميل (اللودينج) */
        #loadingOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid #111; border-top: 5px solid var(--main-color); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>👑 مـتجر الوزيـر بلس 👑</h1>
        <p style="color: #888;">تطبيقات مدموجة وحصرياً بشهادات خاصة</p>
    </div>

    <div class="container" id="appsStore">
        </div>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <p style="color: var(--main-color); margin-top: 15px; font-weight: bold;">جاري تهيئة رابط التثبيت الملكي...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

        // إعدادات الفايربيس الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyAoQFWpkb1B8twwEC8B9S2XqdUDZ6BI0WQ",
            authDomain: "minister-plus.firebaseapp.com",
            projectId: "minister-plus",
            storageBucket: "minister-plus.firebasestorage.app",
            appId: "1:438719729037:web:2d7f14f7c988c3afb501c4"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // جلب التطبيقات وعرضها بتصميم فخم
        onSnapshot(query(collection(db, "apps"), orderBy("time", "desc")), (snapshot) => {
            const store = document.getElementById('appsStore');
            store.innerHTML = '';
            snapshot.forEach((doc) => {
                const app = doc.data();
                const card = `
                    <div class="app-card">
                        <img src="${app.img || 'https://i.ibb.co/vYf8Mv9/icon.png'}" class="app-icon">
                        <span class="app-name">${app.name}</span>
                        <span class="app-version">${app.isReady ? 'مدموج جاهز ✅' : 'شهادة خاصة 🔑'}</span>
                        <button class="btn-install" onclick="initInstall('${app.ipa}', '${app.bundle}', '${app.name}')">تثبيت الآن</button>
                    </div>
                `;
                store.innerHTML += card;
            });
        });

        // وظيفة التثبيت الذكي
        window.initInstall = (ipaUrl, bundleId, appName) => {
            document.getElementById('loadingOverlay').style.display = 'flex';
            
            setTimeout(() => {
                const plistContent = `<?xml version="1.0" encoding="UTF-8"?>
                <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
                <plist version="1.0">
                <dict>
                    <key>items</key>
                    <array>
                        <dict>
                            <key>assets</key>
                            <array>
                                <dict>
                                    <key>kind</key>
                                    <string>software-package</string>
                                    <key>url</key>
                                    <string>${ipaUrl}</string>
                                </dict>
                            </array>
                            <key>metadata</key>
                            <dict>
                                <key>bundle-identifier</key>
                                <string>${bundleId || 'com.minister.plus'}</string>
                                <key>bundle-version</key>
                                <string>1.0</string>
                                <key>kind</key>
                                <string>software</string>
                                <key>title</key>
                                <string>${appName} - الوزير بلس</string>
                            </dict>
                        </dict>
                    </array>
                </dict>
                </plist>`;

                const blob = new Blob([plistContent], { type: 'text/xml' });
                const reader = new FileReader();
                reader.onloadend = function() {
                    const base64Plist = reader.result.split(',')[1];
                    const installUrl = `itms-services://?action=download-manifest&url=data:text/xml;base64,${base64Plist}`;
                    window.location.href = installUrl;
                    document.getElementById('loadingOverlay').style.display = 'none';
                };
                reader.readAsDataURL(blob);
            }, 1500);
        };
    </script>
</body>
</html>
